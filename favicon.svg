<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" fill="#0f1419" rx="12"/>
  
  <!-- Open book -->
  <g transform="translate(32, 32)">
    <!-- Left page -->
    <path d="M -14 -12 L -4 -12 L -4 16 L -14 16 Z" fill="none" stroke="#5ab97f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Right page -->
    <path d="M 4 -12 L 14 -12 L 14 16 L 4 16 Z" fill="none" stroke="#5ab97f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Spine/fold -->
    <line x1="-2" y1="-12" x2="-2" y2="16" stroke="#5ab97f" stroke-width="2" stroke-linecap="round"/>
    <line x1="2" y1="-12" x2="2" y2="16" stroke="#5ab97f" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Leaf/sprout on right page -->
    <path d="M 8 -2 Q 10 -8 8 -14" fill="none" stroke="#5ab97f" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="6" cy="-10" rx="2.5" ry="3.5" fill="#5ab97f" transform="rotate(-45 6 -10)"/>
    <ellipse cx="10" cy="-8" rx="2.5" ry="3.5" fill="#5ab97f" transform="rotate(45 10 -8)"/>
  </g>
</svg>
